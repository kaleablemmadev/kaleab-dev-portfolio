name: misol
description: A beautiful calendar app with reminders
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core
  uuid: ^3.0.7
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  permission_handler: ^11.3.0
  
  # Audio
  audio_service: ^0.18.11
  just_audio: ^0.9.36
  assets_audio_player: ^3.1.1
  
  # File handling
  path_provider: ^2.1.1
  
  # Connectivity
  connectivity_plus: ^5.0.2
  
  # UI
  cupertino_icons: ^1.0.6
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/background.jpg
    - assets/images/logo.png 